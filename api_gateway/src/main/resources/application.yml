server:
  port: 9090

spring:
  application:
    name: api_gateway
  cloud:
    gateway:
      routes:
        - id: clientes-service
          uri: http://localhost:8084
          predicates:
            - Path=/api/v1/clientes/**, /api/v1/direcciones/**

        - id: catalogo_producto-service
          uri: http://localhost:8085
          predicates:
            - Path=/api/v1/producto/**, /api/v1/categoria/**

        - id: catalogo_servicios-service
          uri: http://localhost:8086
          predicates:
            - Path=/api/v1/servicios/**
            
        - id: catalogo_servicios-inventario
          uri: http://localhost:8087
          predicates:
            - Path=/api/v1/stock/**, /api/v1/movimientos/**

        - id: carrito_de_compras-service
          uri: http://localhost:8088
          predicates:
            - Path=/api/v1/carrito/**

